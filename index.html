<script>
    var menu = document.getElementById("side-menu");
    var homeNav = document.getElementById("home-nav");
    var clicked = 0;
    function show(){
        if(!clicked){
            menu.style.left = "0";
            homeNav.style.left = "230px";
            clicked = 1;
        }else{
            menu.style.left ="-230px";
            homeNav.style.left = "0";
            clicked = 0;
        }
    }
</script>
